<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="duels.meta.title">LikeGod.net | Open duels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-page="duels">
  <canvas id="fx-canvas" aria-hidden="true"></canvas>
  <div id="header-root"></div>

  <main class="page-shell" id="page-content">
    <section class="section-sm">
      <div class="container">
        <div class="section-head">
          <span class="eyebrow" data-i18n="duels.hero.eyebrow">Lobby browser</span>
          <h1 data-i18n="duels.hero.title">Open duel lobbies</h1>
          <p data-i18n="duels.hero.subtitle">Filter rooms by map, bank, and rank band.</p>
        </div>

        <div class="controls-row">
          <div class="form-group">
            <label class="form-label" data-i18n="duels.filters.map">Map</label>
            <select class="form-select" id="f-map"></select>
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="duels.filters.bankMin">Minimum bank</label>
            <input class="form-input" id="f-bankmin" type="number" min="0" step="0.01" placeholder="0">
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="duels.filters.bankMax">Maximum bank</label>
            <input class="form-input" id="f-bankmax" type="number" min="0" step="0.01" placeholder="—">
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="duels.filters.rank">Preferred rank</label>
            <select class="form-select" id="f-rank"></select>
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="duels.list.title">Available rooms</label>
            <select class="form-select" id="f-sort">
              <option value="high" data-i18n="duels.sort.high">Highest bank</option>
              <option value="low" data-i18n="duels.sort.low">Lowest bank</option>
            </select>
          </div>
        </div>

        <div class="duel-grid" id="duels-grid"></div>
      </div>
    </section>
  </main>

  <div id="footer-root"></div>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>
  <div id="modal-backdrop" class="modal-backdrop hidden" role="dialog" aria-modal="true">
    <div id="modal-content" class="modal"></div>
  </div>

  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/effects.js"></script>
  <script src="/static/js/payments.js"></script>
  <script src="/static/js/slider.js"></script>
  <script src="/static/js/app.js"></script>
  <script>App.start('duels');</script>
</body>
</html>
