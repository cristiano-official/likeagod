<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LikeGod.net | Matchmaking Lobby Hub</title>
    <style>
        :root { --bg: #121214; --card: #1a1a1e; --accent: #4CAF50; --text: #ffffff; --text-muted: #94a3b8; --blue: #3b82f6; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { background: var(--card); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d2d34; }
        .logo { font-size: 24px; font-weight: bold; color: var(--accent); text-decoration: none; }
        nav { display: flex; align-items: center; }
        nav a { color: var(--text); text-decoration: none; margin-left: 20px; font-weight: 500; }
        .lang-btn { background: #2d2d34; color: var(--text-muted); border: 1px solid #444; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-left: 15px; cursor: pointer; font-weight: bold; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .grid-layout { display: grid; grid-template-columns: 300px 1fr; gap: 30px; }
        .sidebar { background: var(--card); border-radius: 10px; padding: 20px; border: 1px solid #2d2d34; height: fit-content; }
        .main-panel { display: flex; flex-direction: column; gap: 20px; }
        h2 { margin-top: 0; color: var(--accent); font-size: 18px; border-bottom: 1px solid #2d2d34; padding-bottom: 10px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 13px; color: var(--text-muted); }
        input, select { width: 100%; box-sizing: border-box; background: #121214; border: 1px solid #2d2d34; padding: 8px 12px; border-radius: 6px; color: white; }
        .sorting-header { background: var(--card); border-radius: 10px; padding: 15px 20px; border: 1px solid #2d2d34; display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .sort-buttons { display: flex; gap: 10px; }
        .btn-sort { background: #121214; color: var(--text-muted); border: 1px solid #2d2d34; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .duel-item { background: var(--card); padding: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d2d34; border-left: 4px solid var(--accent); }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 18px; font-weight: bold; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <a href="/main" class="logo">LIKEGOD.NET</a>
        <nav id="navbar"></nav>
    </header>

    <div class="container">
        <div class="grid-layout">
            <div class="sidebar">
                <h2>Lobby Filters</h2>
                <div class="form-group">
                    <label>Game Map</label>
                    <select id="filter-map" onchange="applyFilters()">
                        <option value="all">All Maps</option>
                        <option value="aim_redline">aim_redline</option>
                    </select>
                </div>
                <div class="form-group"><label>Min Bank ($)</label><input type="number" id="filter-bank-min" value="0" oninput="applyFilters()"></div>
                <div class="form-group"><label>Max Bank ($)</label><input type="number" id="filter-bank-max" value="1000" oninput="applyFilters()"></div>
            </div>

            <div class="main-panel">
                <div class="sorting-header">
                    <span>Sort Lobbies By:</span>
                    <div class="sort-buttons">
                        <button class="btn-sort active" onclick="setSort('bank', 'desc')">Bank: High to Low</button>
                        <button class="btn-sort" onclick="setSort('bank', 'asc')">Bank: Low to High</button>
                    </div>
                </div>
                <div id="lobbies-wrapper" style="display: flex; flex-direction: column; gap: 15px;">Loading active lobbies...</div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let allDuels = [];

        function showLangAlert() {
            alert("Language selection function will be available soon! / Функция выбора языка появится в ближайшее время!");
        }

        function loadNavbar() {
            fetch('/api/main').then(res => res.json()).then(data => {
                const nav = document.getElementById('navbar');
                let langHtml = `<button onclick="showLangAlert()" class="lang-btn">EN / RU</button>`;
                if (data.authenticated) {
                    currentUser = data.user;
                    nav.innerHTML = `<a href="/premium">★ Premium</a><a href="/p/${data.user.username}">Profile</a><span style="margin-left:20px; font-weight:bold; color:var(--accent)">$${data.user.balance}</span><a href="/auth/logout" style="color: #ef4444; margin-left: 15px; text-decoration:none;">Logout</a>${langHtml}`;
                } else {
                    nav.innerHTML = `<a href="/auth/steam" class="btn">Login via Steam</a> ${langHtml}`;
                }
                loadDuelsRaw();
            });
        }

        function loadDuelsRaw() {
            fetch('/api/v1/duels').then(res => res.json()).then(duels => { allDuels = duels; renderDuels(duels); });
        }

        function renderDuels(duels) {
            const container = document.getElementById('lobbies-wrapper');
            container.innerHTML = '';
            if(duels.length === 0) { container.innerHTML = '<p>No duels match selected filters.</p>'; return; }
            duels.forEach(d => {
                container.innerHTML += `
                    <div class="duel-item">
                        <div><strong>Lobby #${d.id}</strong><br><span style="font-size:13px; color:var(--text-muted);">Creator: ${d.creator_username}</span></div>
                        <div style="display:flex; align-items:center; gap:25px;"><strong>$${d.total_bank}</strong><button class="btn" onclick="window.location.href='/duel?id=${d.id}'">Open Room</button></div>
                    </div>`;
            });
        }

        window.onload = loadNavbar;
    </script>
</body>
</html>
