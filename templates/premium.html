<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LikeGod.net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="/main"><span class="brand__mark">LG</span><span class="brand__text"><span class="brand__title">LIKEGOD.NET</span><span class="brand__subtitle" data-i18n="common.brandSubtitle"></span></span></a>
      <div id="navbar"></div>
    </div>
  </header>

  <main class="page-shell">
    <section class="hero">
      <div>
        <span class="hero__eyebrow" data-i18n="premium.hero.eyebrow"></span>
        <h1 data-i18n="premium.hero.title"></h1>
        <p data-i18n="premium.hero.subtitle"></p>
      </div>
      <div class="surface" id="premium-status-card">
        <div class="section-head"><div><h3 data-i18n="premium.status.title"></h3></div></div>
        <div class="state-card" data-i18n="common.states.loading"></div>
      </div>
    </section>

    <section class="surface">
      <div class="section-head"><div><h2 data-i18n="premium.cards.title"></h2><p data-i18n="premium.cards.subtitle"></p></div></div>
      <div class="tariff-grid" id="tariffs-list"><div class="state-card" data-i18n="common.states.loading"></div></div>
    </section>
  </main>

  <footer class="site-footer" id="footer-shell"></footer>
  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/payments.js"></script>
  <script src="/static/js/effects.js"></script>
  <script src="/static/js/slider.js"></script>
  <script src="/static/js/app.js"></script>
  <script>
    let me = null;

    function renderStatus() {
      const target = document.getElementById('premium-status-card');
      if (!me) {
        target.innerHTML = `<div class="state-card">${LikeGodApp.t('premium.status.guest')}</div>`;
        return;
      }
      if (me.is_premium && me.premium_until) {
        target.innerHTML = `<div class="stat-card"><div class="stat-card__label">${LikeGodApp.t('premium.status.active')}</div><div class="stat-card__value">${new Date(me.premium_until).toLocaleDateString()}</div></div>`;
      } else {
        target.innerHTML = `<div class="state-card">${LikeGodApp.t('premium.status.inactive')}</div>`;
      }
    }

    async function loadPremium() {
      try {
        if (LikeGodApp.getUser()) {
          me = await LikeGodApp.api('/user/me', { headers: {} });
        }
      } catch (error) {
        me = null;
      }
      renderStatus();

      try {
        const tariffs = await LikeGodApp.api('/api/v1/premium/tariffs', { headers: {} });
        const target = document.getElementById('tariffs-list');
        if (!tariffs.length) {
          target.innerHTML = `<div class="state-card">${LikeGodApp.t('common.states.emptyTariffs')}</div>`;
          return;
        }
        target.innerHTML = tariffs.map((tariff) => `
          <article class="tariff-card">
            ${tariff.discount_text ? `<span class="badge badge-premium">${tariff.discount_text}</span>` : ''}
            <h3>${LikeGodApp.t('premium.cards.months', { months: tariff.duration_months })}</h3>
            <div class="duel-card__value">${LikeGodApp.formatMoney(tariff.price)}</div>
            <p class="page-subtitle">${LikeGodApp.t('premium.cards.cardText')}</p>
            <button class="btn-premium" type="button" data-buy-tariff="${tariff.id}" ${me?.is_premium ? 'disabled' : ''}>${LikeGodApp.t('premium.cards.buy')}</button>
          </article>
        `).join('');
        target.querySelectorAll('[data-buy-tariff]').forEach((button) => button.addEventListener('click', () => buyPremium(button.dataset.buyTariff)));
      } catch (error) {
        document.getElementById('tariffs-list').innerHTML = `<div class="state-card">${error.message}</div>`;
      }
    }

    async function buyPremium(tariffId) {
      try {
        await LikeGodApp.api('/api/v1/premium/buy', { method: 'POST', body: JSON.stringify({ tariff_id: Number(tariffId) }) });
        LikeGodApp.showToast(LikeGodApp.t('premium.toasts.purchased'), 'success');
        await loadPremium();
      } catch (error) {
        LikeGodApp.showToast(error.message, 'error');
      }
    }

    document.addEventListener('likeagod:language-changed', loadPremium);
    LikeGodApp.boot({ titleKey: 'premium.meta.title', onReady: loadPremium });
  </script>
</body>
</html>
