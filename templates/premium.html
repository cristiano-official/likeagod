<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="premium.meta.title">LikeGod.net | Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-page="premium">
  <canvas id="fx-canvas" aria-hidden="true"></canvas>
  <div id="header-root"></div>

  <main class="page-shell" id="page-content">
    <section class="section-sm">
      <div class="container stack">
        <div class="section-head">
          <span class="eyebrow" data-i18n="premium.hero.eyebrow">Premium access</span>
          <h1 data-i18n="premium.hero.title">Upgrade your duel profile</h1>
          <p data-i18n="premium.hero.subtitle">Highlight your account and keep premium status visible.</p>
        </div>

        <div id="premium-status"></div>

        <div>
          <div class="section-head">
            <span class="eyebrow" data-i18n="premium.cards.title">Tariff storefront</span>
            <p data-i18n="premium.cards.subtitle">All cards are loaded from the backend tariffs table.</p>
          </div>
          <div class="tariff-grid" id="tariff-grid"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-root"></div>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>
  <div id="modal-backdrop" class="modal-backdrop hidden" role="dialog" aria-modal="true">
    <div id="modal-content" class="modal"></div>
  </div>

  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/effects.js"></script>
  <script src="/static/js/payments.js"></script>
  <script src="/static/js/slider.js"></script>
  <script src="/static/js/app.js"></script>
  <script>App.start('premium');</script>
</body>
</html>
