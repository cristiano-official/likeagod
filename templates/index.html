<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LikeGod.net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="/main">
        <span class="brand__mark">LG</span>
        <span class="brand__text">
          <span class="brand__title">LIKEGOD.NET</span>
          <span class="brand__subtitle" data-i18n="common.brandSubtitle"></span>
        </span>
      </a>
      <div id="navbar"></div>
    </div>
  </header>

  <main class="page-shell">
    <section class="hero">
      <div>
        <span class="hero__eyebrow" data-i18n="home.hero.eyebrow"></span>
        <h1 data-i18n="home.hero.title"></h1>
        <p data-i18n="home.hero.subtitle"></p>
        <div class="hero__actions">
          <a class="btn" href="/duels" data-i18n="home.hero.openDuels"></a>
          <button class="btn-secondary" type="button" id="hero-deposit-btn" data-i18n="home.hero.deposit"></button>
        </div>
      </div>
      <div class="surface">
        <div class="section-head">
          <div>
            <span class="section-title__eyebrow" data-i18n="home.hero.statusEyebrow"></span>
            <h3 data-i18n="home.hero.sessionTitle"></h3>
          </div>
        </div>
        <div id="hero-session-card" class="state-card" data-i18n="common.states.loading"></div>
      </div>
    </section>

    <section class="main-grid">
      <div class="stack">
        <section class="surface">
          <div class="section-head">
            <div>
              <span class="section-title__eyebrow" data-i18n="home.news.eyebrow"></span>
              <h2 data-i18n="home.news.title"></h2>
              <p data-i18n="home.news.subtitle"></p>
            </div>
          </div>
          <div id="news-list" class="news-rail">
            <div class="state-card" data-i18n="common.states.loading"></div>
          </div>
        </section>

        <section class="surface">
          <div class="section-head">
            <div>
              <span class="section-title__eyebrow" data-i18n="home.activeDuels.eyebrow"></span>
              <h2 data-i18n="home.activeDuels.title"></h2>
            </div>
          </div>
          <div id="active-duels-list" class="duel-list">
            <div class="state-card" data-i18n="common.states.loading"></div>
          </div>
        </section>
      </div>

      <div class="side-panel">
        <section class="surface" id="create-lobby-card">
          <div class="section-head">
            <div>
              <span class="section-title__eyebrow" data-i18n="home.create.eyebrow"></span>
              <h2 data-i18n="home.create.title"></h2>
              <p data-i18n="home.create.subtitle"></p>
            </div>
          </div>
          <div class="form-fields">
            <div class="form-group">
              <label for="total_bank" data-i18n="home.create.bank"></label>
              <input id="total_bank" type="number" min="1" step="0.5" value="10">
            </div>
            <div class="form-group">
              <label for="map_name" data-i18n="home.create.map"></label>
              <select id="map_name">
                <option value="aim_redline">aim_redline</option>
                <option value="aim_ag_texture">aim_ag_texture</option>
                <option value="awp_india">awp_india</option>
              </select>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label for="min_rank" data-i18n="home.create.minRank"></label>
                <select id="min_rank"></select>
              </div>
              <div class="form-group">
                <label for="max_rank" data-i18n="home.create.maxRank"></label>
                <select id="max_rank"></select>
              </div>
            </div>
          </div>
          <div class="form-actions" style="margin-top:18px;">
            <button class="btn" type="button" id="create-lobby-btn" data-i18n="home.create.submit"></button>
          </div>
        </section>

        <section class="surface">
          <div class="section-head">
            <div>
              <span class="section-title__eyebrow" data-i18n="home.features.eyebrow"></span>
              <h2 data-i18n="home.features.title"></h2>
            </div>
          </div>
          <div class="list-stack">
            <div class="stat-card"><div class="stat-card__label" data-i18n="home.features.fast.label"></div><div class="muted" data-i18n="home.features.fast.text"></div></div>
            <div class="stat-card"><div class="stat-card__label" data-i18n="home.features.escrow.label"></div><div class="muted" data-i18n="home.features.escrow.text"></div></div>
            <div class="stat-card"><div class="stat-card__label" data-i18n="home.features.global.label"></div><div class="muted" data-i18n="home.features.global.text"></div></div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="footer-shell"></footer>
  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/payments.js"></script>
  <script src="/static/js/effects.js"></script>
  <script src="/static/js/slider.js"></script>
  <script src="/static/js/app.js"></script>
  <script>
    const ranks = Array.from({ length: 10 }, (_, index) => index + 1);
    let newsCarouselController = null;

    function fillRankSelects() {
      const minSelect = document.getElementById('min_rank');
      const maxSelect = document.getElementById('max_rank');
      minSelect.innerHTML = ranks.map((rank) => `<option value="${rank}">${LikeGodApp.t('common.rank', { rank })}</option>`).join('');
      maxSelect.innerHTML = ranks.map((rank) => `<option value="${rank}" ${rank === 10 ? 'selected' : ''}>${LikeGodApp.t('common.rank', { rank })}</option>`).join('');
    }

    function renderHeroSession(data) {
      const target = document.getElementById('hero-session-card');
      if (!data.authenticated || !data.user) {
        target.innerHTML = `
          <h3>${LikeGodApp.t('home.hero.guestTitle')}</h3>
          <p class="page-subtitle">${LikeGodApp.t('home.hero.guestText')}</p>
          <p class="muted">${LikeGodApp.t('home.hero.guestValue')}</p>
          <a class="steam-btn" href="/auth/steam">${LikeGodApp.t('common.nav.loginSteam')}</a>
        `;
        return;
      }

      const stats = data.stats || {};
      const winrate = Number(stats.winrate || 0);
      target.innerHTML = `
        <div class="user-summary">
          <div class="avatar"><img src="${data.user.avatar || ''}" alt="avatar"></div>
          <div>
            <h3 style="margin:0;">${data.user.username}</h3>
            <div class="meta-line">
              <span>${LikeGodApp.t('common.labels.balance')}: ${LikeGodApp.formatMoney(data.user.balance || 0)}</span>
              <span>${LikeGodApp.t('common.labels.language')}: ${(data.user.language || 'en').toUpperCase()}</span>
            </div>
          </div>
        </div>
        <div class="compact-stats">
          <div class="compact-stat">
            <small>${LikeGodApp.t('profile.stats.elo')}</small>
            <strong>${stats.elo_val || 1000}</strong>
          </div>
          <div class="compact-stat">
            <small>${LikeGodApp.t('profile.stats.rank')}</small>
            <strong>${LikeGodApp.t('common.rank', { rank: stats.rank || 1 })}</strong>
          </div>
          <div class="compact-stat">
            <small>${LikeGodApp.t('profile.stats.winrate')}</small>
            <strong>${winrate}%</strong>
            <div class="progress" role="progressbar" aria-valuenow="${Math.max(0, Math.min(100, winrate))}" aria-valuemin="0" aria-valuemax="100"><span style="width:${Math.max(0, Math.min(100, winrate))}%"></span></div>
          </div>
        </div>
      `;
    }

    function renderNews(news) {
      const target = document.getElementById('news-list');
      if (!news.length) {
        target.innerHTML = `<div class="state-card">${LikeGodApp.t('common.states.emptyNews')}</div>`;
        return;
      }
      target.innerHTML = `
        <div class="news-carousel" id="news-carousel">
          <button class="carousel-arrow carousel-arrow--prev" type="button" data-carousel-prev aria-label="Previous slide">‹</button>
          <button class="carousel-arrow carousel-arrow--next" type="button" data-carousel-next aria-label="Next slide">›</button>
          <div class="news-carousel__viewport">
            <div class="news-carousel__track" data-carousel-track>
              ${news.map((item) => `
                <article class="news-carousel__slide" data-carousel-slide style="background-image:url('${item.image_path || ''}')">
                  <div class="news-carousel__content">
                    <h3 class="news-carousel__title">${item.title}</h3>
                    <div class="news-carousel__date">${new Date(item.created_at).toLocaleDateString()}</div>
                    ${item.btn_text && item.btn_url ? `<a class="btn" href="${item.btn_url}" target="_blank" rel="noreferrer">${item.btn_text}</a>` : ''}
                  </div>
                </article>
              `).join('')}
            </div>
          </div>
          <div class="carousel-dots" data-carousel-dots></div>
        </div>
      `;

      newsCarouselController?.destroy?.();
      newsCarouselController = LikeGodSlider.init(document.getElementById('news-carousel'), { auto: true, interval: 5200 });
    }

    function renderActiveDuels(duels) {
      const target = document.getElementById('active-duels-list');
      if (!duels.length) {
        target.innerHTML = `<div class="state-card">${LikeGodApp.t('common.states.emptyDuels')}</div>`;
        return;
      }
      target.innerHTML = duels.map((duel) => `
        <article class="duel-card">
          <div>
            <div class="meta-line"><span>#${duel.id}</span><span>${LikeGodApp.statusLabel(duel.status)}</span></div>
            <h3 style="margin:8px 0;">${duel.creator_name} vs ${duel.guest_name}</h3>
            <div class="duel-card__meta">
              <span>${LikeGodApp.t('common.labels.bank')}: ${LikeGodApp.formatMoney(duel.total_bank)}</span>
            </div>
          </div>
          <a class="btn-ghost" href="/duel?id=${duel.id}">${LikeGodApp.t('common.actions.open')}</a>
        </article>
      `).join('');
    }

    async function createLobby() {
      const payload = {
        total_bank: Number(document.getElementById('total_bank').value || 0),
        map_name: document.getElementById('map_name').value,
        min_rank: Number(document.getElementById('min_rank').value || 1),
        max_rank: Number(document.getElementById('max_rank').value || 10)
      };

      try {
        const result = await LikeGodApp.api('/api/v1/duels', {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        window.location.href = `/duel?id=${result.duel_id}`;
      } catch (error) {
        LikeGodApp.showToast(error.message, 'error');
      }
    }

    async function initHome() {
      const data = LikeGodApp.getLandingData();
      fillRankSelects();
      renderHeroSession(data);
      renderNews(data.news || []);
      renderActiveDuels(data.my_duels || []);
      document.getElementById('hero-deposit-btn').onclick = () => LikeGodApp.openPaymentModal('deposit');
      document.getElementById('create-lobby-btn').onclick = createLobby;
      document.getElementById('create-lobby-card').style.display = data.authenticated ? 'block' : 'none';
    }

    document.addEventListener('likeagod:language-changed', () => {
      fillRankSelects();
      initHome();
    });

    LikeGodApp.boot({ titleKey: 'home.meta.title', onReady: initHome });
  </script>
</body>
</html>
