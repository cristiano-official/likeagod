<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="profile.meta.title">LikeGod.net | Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-page="profile">
  <canvas id="fx-canvas" aria-hidden="true"></canvas>
  <div id="header-root"></div>

  <main class="page-shell" id="page-content">
    <section class="section-sm">
      <div class="container stack">
        <div class="card-lg" id="profile-root"></div>

        <div>
          <div class="section-head">
            <span class="eyebrow" data-i18n="profile.stats.title">Performance snapshot</span>
            <p data-i18n="profile.stats.subtitle">Public duel metrics and rank indicators.</p>
          </div>
          <div class="stats-grid" id="stats-root"></div>
        </div>

        <div class="stack hidden" id="owner-sections">
          <div class="card-lg" id="billing-root"></div>
          <div class="card-lg" id="history-root"></div>
          <div class="card-lg" id="settings-root"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-root"></div>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>
  <div id="modal-backdrop" class="modal-backdrop hidden" role="dialog" aria-modal="true">
    <div id="modal-content" class="modal"></div>
  </div>

  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/effects.js"></script>
  <script src="/static/js/payments.js"></script>
  <script src="/static/js/slider.js"></script>
  <script src="/static/js/app.js"></script>
  <script>App.start('profile');</script>
</body>
</html>
