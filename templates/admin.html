<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LikeGod.net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="/main"><span class="brand__mark">LG</span><span class="brand__text"><span class="brand__title">LIKEGOD ADMIN</span><span class="brand__subtitle" data-i18n="admin.hero.eyebrow"></span></span></a>
      <div id="navbar"></div>
    </div>
  </header>

  <main class="page-shell">
    <section class="surface">
      <div class="section-head">
        <div>
          <h1 class="page-title" data-i18n="admin.hero.title"></h1>
          <p class="page-subtitle" data-i18n="admin.hero.subtitle"></p>
        </div>
      </div>
    </section>

    <section class="admin-grid" style="margin-top:20px;">
      <div class="stack">
        <section class="surface">
          <div class="section-head"><div><h2 data-i18n="admin.users.title"></h2><p data-i18n="admin.users.subtitle"></p></div></div>
          <div class="form-grid">
            <div class="form-group"><label for="admin-user-target" data-i18n="admin.users.target"></label><input id="admin-user-target" type="text" data-i18n-placeholder="admin.users.targetPlaceholder"></div>
            <div class="form-group"><label for="admin-amount" data-i18n="admin.users.amount"></label><input id="admin-amount" type="number" value="10" step="0.5"></div>
          </div>
          <div class="button-row"><button class="btn" type="button" id="admin-add-balance" data-i18n="admin.users.addBalance"></button><button class="btn-secondary" type="button" id="admin-set-elo" data-i18n="admin.users.setElo"></button></div>
        </section>

        <section class="surface">
          <div class="section-head"><div><h2 data-i18n="admin.news.title"></h2><p data-i18n="admin.news.subtitle"></p></div></div>
          <div class="form-fields">
            <div class="form-group"><label for="news-title" data-i18n="admin.news.form.title"></label><input id="news-title" type="text"></div>
            <div class="form-group"><label for="news-image-url" data-i18n="admin.news.form.image"></label><input id="news-image-url" type="text"></div>
            <div class="form-grid">
              <div class="form-group"><label for="news-btn-text" data-i18n="admin.news.form.buttonText"></label><input id="news-btn-text" type="text"></div>
              <div class="form-group"><label for="news-btn-url" data-i18n="admin.news.form.buttonUrl"></label><input id="news-btn-url" type="text"></div>
            </div>
          </div>
          <div class="form-actions"><button class="btn" type="button" id="news-submit-btn" data-i18n="admin.news.form.submit"></button></div>
        </section>

        <section class="surface">
          <div class="section-head"><div><h2 data-i18n="admin.news.listTitle"></h2></div></div>
          <div id="admin-news-list" class="duel-list"><div class="state-card" data-i18n="common.states.loading"></div></div>
        </section>
      </div>

      <div class="stack">
        <section class="surface">
          <div class="section-head"><div><h2 data-i18n="admin.tariffs.title"></h2><p data-i18n="admin.tariffs.subtitle"></p></div></div>
          <div class="form-fields">
            <div class="form-group"><label for="tariff-duration" data-i18n="admin.tariffs.duration"></label><select id="tariff-duration"><option value="1">1</option><option value="3">3</option><option value="12">12</option></select></div>
            <div class="form-group"><label for="tariff-price" data-i18n="admin.tariffs.price"></label><input id="tariff-price" type="number" step="0.01"></div>
            <div class="form-group"><label for="tariff-discount" data-i18n="admin.tariffs.discount"></label><input id="tariff-discount" type="text"></div>
          </div>
          <div class="form-actions"><button class="btn-secondary" type="button" id="tariff-submit-btn" data-i18n="admin.tariffs.submit"></button></div>
        </section>

        <section class="surface">
          <div class="section-head"><div><h2 data-i18n="admin.commission.title"></h2><p data-i18n="admin.commission.subtitle"></p></div></div>
          <div class="form-group"><label for="admin-commission" data-i18n="admin.commission.label"></label><input id="admin-commission" type="number" step="0.5" min="0" max="100"></div>
          <div class="form-actions"><button class="btn" type="button" id="commission-submit-btn" data-i18n="admin.commission.submit"></button></div>
        </section>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="footer-shell"></footer>
  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/payments.js"></script>
  <script src="/static/js/effects.js"></script>
  <script src="/static/js/slider.js"></script>
  <script src="/static/js/app.js"></script>
  <script>
    async function ensureAdmin() {
      const user = LikeGodApp.getUser();
      if (!user || user.role !== 'admin') {
        LikeGodApp.showToast(LikeGodApp.t('admin.errors.forbidden'), 'error');
        setTimeout(() => { window.location.href = '/main'; }, 600);
        return false;
      }
      return true;
    }

    async function loadNews() {
      try {
        const news = await LikeGodApp.api('/news', { headers: {} });
        const target = document.getElementById('admin-news-list');
        if (!news.length) {
          target.innerHTML = `<div class="state-card">${LikeGodApp.t('common.states.emptyNews')}</div>`;
          return;
        }
        target.innerHTML = news.map((item) => `
          <article class="duel-card">
            <div>
              <h3 style="margin:0 0 6px;">${item.title}</h3>
              <div class="meta-line">${item.image_path}</div>
            </div>
            <button class="btn-danger" type="button" data-news-delete="${item.id}">${LikeGodApp.t('common.actions.delete')}</button>
          </article>
        `).join('');
        target.querySelectorAll('[data-news-delete]').forEach((button) => button.addEventListener('click', () => deleteNews(button.dataset.newsDelete)));
      } catch (error) {
        document.getElementById('admin-news-list').innerHTML = `<div class="state-card">${error.message}</div>`;
      }
    }

    async function submitNews() {
      try {
        await LikeGodApp.api('/news/create', {
          method: 'POST',
          body: JSON.stringify({
            title: document.getElementById('news-title').value,
            image_path: document.getElementById('news-image-url').value,
            btn_text: document.getElementById('news-btn-text').value || null,
            btn_url: document.getElementById('news-btn-url').value || null
          })
        });
        LikeGodApp.showToast(LikeGodApp.t('admin.toasts.newsSaved'), 'success');
        await loadNews();
      } catch (error) {
        LikeGodApp.showToast(error.message, 'error');
      }
    }

    async function deleteNews(id) {
      try {
        await LikeGodApp.api(`/news/${id}`, { method: 'DELETE' });
        LikeGodApp.showToast(LikeGodApp.t('admin.toasts.newsDeleted'), 'success');
        await loadNews();
      } catch (error) {
        LikeGodApp.showToast(error.message, 'error');
      }
    }

    async function adjustBalance() {
      try {
        const payload = { target: document.getElementById('admin-user-target').value, amount: Number(document.getElementById('admin-amount').value || 0) };
        const result = await LikeGodApp.api('/api/v1/admin/adjust-balance', { method: 'POST', body: JSON.stringify(payload) });
        LikeGodApp.showToast(result.message, 'success');
      } catch (error) {
        LikeGodApp.showToast(error.message, 'error');
      }
    }

    async function adjustElo() {
      try {
        const payload = { target: document.getElementById('admin-user-target').value, amount: Number(document.getElementById('admin-amount').value || 0) };
        const result = await LikeGodApp.api('/api/v1/admin/adjust-elo', { method: 'POST', body: JSON.stringify(payload) });
        LikeGodApp.showToast(result.message, 'success');
      } catch (error) {
        LikeGodApp.showToast(error.message, 'error');
      }
    }

    async function updateTariff() {
      try {
        await LikeGodApp.api('/api/v1/admin/tariffs', {
          method: 'POST',
          body: JSON.stringify({
            duration_months: Number(document.getElementById('tariff-duration').value),
            price: Number(document.getElementById('tariff-price').value || 0),
            discount_text: document.getElementById('tariff-discount').value || null
          })
        });
        LikeGodApp.showToast(LikeGodApp.t('admin.toasts.tariffSaved'), 'success');
      } catch (error) {
        LikeGodApp.showToast(error.message, 'error');
      }
    }

    async function updateCommission() {
      try {
        const result = await LikeGodApp.api('/api/v1/admin/commission', {
          method: 'POST',
          body: JSON.stringify({ commission_percent: Number(document.getElementById('admin-commission').value || 0) })
        });
        LikeGodApp.showToast(`${LikeGodApp.t('admin.toasts.commissionSaved')} ${result.commission_percent}%`, 'success');
      } catch (error) {
        LikeGodApp.showToast(error.message, 'error');
      }
    }

    async function initAdminPage() {
      if (!await ensureAdmin()) return;
      document.getElementById('news-submit-btn').addEventListener('click', submitNews);
      document.getElementById('admin-add-balance').addEventListener('click', adjustBalance);
      document.getElementById('admin-set-elo').addEventListener('click', adjustElo);
      document.getElementById('tariff-submit-btn').addEventListener('click', updateTariff);
      document.getElementById('commission-submit-btn').addEventListener('click', updateCommission);
      loadNews();
    }

    LikeGodApp.boot({ titleKey: 'admin.meta.title', onReady: initAdminPage });
  </script>
</body>
</html>
